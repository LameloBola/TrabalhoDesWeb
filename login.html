<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="topo">
        <div class="logo-titulo">
            <img src="img/logo_pizzaria.png" alt="Pizza" class="logo">
            <span class="nome-logo">Pizzaria Express</span>
        </div>
        <div class="nav-texts">
            <p id="home"><a href="home.html">Página Inicial</a></p>
            <p id="cardapio"><a href="cardapio.html">Cardápio</a></p>
            <p id="contato"><a href="contato.html">Contato</a></p>
        </div>

    </div>
    
    
    <form class="Container" action="/login" method="post">
    
        <p>Login</p>
        <label>Email:</label><br>
        <input type="email" id="email" name="email" required>
        <br>
        <label>Senha:</label><br>
        <input type="password" id="senha" name="senha" required>
        <br>
        <button type="submit"><a href="/index.html">Login</a></button>

    </form>
</body>
</html>
