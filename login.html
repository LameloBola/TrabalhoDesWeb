<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pizzaria Express</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script src="script.js"></script>
    <div class="topo">
        <div class="logo-titulo">
            <img src="img/logo_pizzaria.png" alt="Pizza" class="logo">
            <span class="nome-logo">Pizzaria Express</span>
        </div>
        <div class="nav-texts">
            <p id="home"><a href="home.html">Página Inicial</a></p>
            <p id="cardapio"><a href="cardapio.html">Cardápio</a></p>
            <p id="contato"><a href="contato.html">Contato</a></p>
            <p id="login"><a href="login.html">Login</a></p>
        </div>
    </div>

    <main>
        <section class="hero" id="home">
            <div>
                <h1>Pizzaria Express</h1>
                <p>Pizza quentinha, entrega rápida e sabor caseiro para sua casa.</p>
                <a class="btn" href="home.html">Página Inicial</a>
            </div>
        </section>

        <section class="contato" id="contato">
            <div class="contact-panel">
                <h2>Login</h2>
                <p class="disabled-note">Login desabilitado temporariamente para este projeto.</p>
                <form class="Container" aria-disabled="true">
                    <label for="email">Email</label>
                    <input id="email" type="email" placeholder="seu@email.com" disabled>

                    <label for="senha">Senha</label>
                    <input id="senha" type="password" placeholder="••••••" disabled>

                    <button type="button" disabled>Login</button>
                    <p class="muted" style="margin-top:10px;">Este formulário é apenas ilustrativo.</p>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
